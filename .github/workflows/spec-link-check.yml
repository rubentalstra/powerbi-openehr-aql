name: spec-link-check

on:
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    name: Lychee link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --verbose
            --exclude-all-private
            --exclude-mail
            --max-redirects 5
            "docs/**/*.md"
            "IMPLEMENTATION_PLAN.md"
            "README.md"
            "ROADMAP.md"
            "CONTRIBUTING.md"
          output: ./lychee-report.md
          fail: false

      - name: Open issue on broken links
        if: steps.lychee.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "Broken links reported by lychee"
          content-filepath: ./lychee-report.md
          labels: docs, link-check
