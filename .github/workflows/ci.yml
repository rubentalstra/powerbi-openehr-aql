name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  EHRBASE_VERSION: "2.15.0"
  POSTGRES_VERSION: "16.4-alpine"
  EHRBASE_USER: ehrbase
  EHRBASE_PASSWORD: ehrbase
  EHRBASE_PORT: 8080

jobs:
  build:
    name: Build connector (windows-latest)
    runs-on: windows-latest
    outputs:
      mez-path: ${{ steps.locate.outputs.mez }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          # TargetFramework in src/OpenEHR.proj is net10.0.
          dotnet-version: "10.0.x"

      - name: Restore Power Query SDK
        shell: pwsh
        run: |
          # Microsoft.PowerQuery.SdkTools is an MSBuild SDK pinned in /global.json.
          # Restore it explicitly so Sdk.props exists in the NuGet cache before build.
          dotnet restore src/OpenEHR.proj
          $version = (Get-Content global.json | ConvertFrom-Json).'msbuild-sdks'.'Microsoft.PowerQuery.SdkTools'
          $sdkProps = Join-Path $env:USERPROFILE ".nuget\packages\microsoft.powerquery.sdktools\$version\Sdk\Sdk.props"
          if (-not (Test-Path $sdkProps)) {
            throw "Sdk.props not found at $sdkProps after restore."
          }
          Write-Output "Restored $sdkProps"

      - name: Build .mez
        shell: pwsh
        run: |
          dotnet build src/OpenEHR.proj --configuration Release --no-restore
          Get-ChildItem -Recurse -Path src\bin -Filter *.mez | ForEach-Object { Write-Host "Built: $($_.FullName)" }

      - name: Locate .mez
        id: locate
        shell: pwsh
        run: |
          $mez = Get-ChildItem -Recurse -Path src\bin -Filter OpenEHR.mez | Select-Object -First 1
          if (-not $mez) { throw "OpenEHR.mez not found under src\bin." }
          "mez=$($mez.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: OpenEHR-mez
          path: ${{ steps.locate.outputs.mez }}
          retention-days: 14

  integration:
    name: Canonical AQL smoke tests
    runs-on: ubuntu-latest
    # Using docker compose (not services:) so ehrbase can depends_on:
    # service_healthy on postgres and the Postgres image's own init scripts
    # (extensions + locale) are preserved. GH service containers start
    # before actions/checkout runs, so ordering and volume-based init would
    # not work there.
    steps:
      - uses: actions/checkout@v6

      - name: Seed .env for docker compose
        run: cp dev/.env.example dev/.env

      - name: Start Postgres + EHRbase
        working-directory: dev
        run: |
          docker compose up -d ehrbase-postgres ehrbase
          docker compose ps

      - name: Wait for EHRbase health
        run: |
          # The /management endpoints aren't exposed by EHRbase's bundled
          # docker profile (log: "Exposing 0 endpoint(s) beneath base path
          # '/management'"), so poll a real API endpoint with Basic auth.
          # 200 = ready; any other status = keep trying.
          for i in $(seq 1 120); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" \
              -u ehrbase:ehrbase \
              -H "Accept: application/json" \
              http://localhost:8080/ehrbase/rest/openehr/v1/definition/template/adl1.4 || true)
            if [ "$code" = "200" ]; then
              echo "EHRbase is UP (template endpoint returned 200)"
              exit 0
            fi
            sleep 2
          done
          echo "EHRbase did not become healthy in 240s" >&2
          docker compose -f dev/docker-compose.yml logs ehrbase-postgres ehrbase || true
          exit 1

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Load seed data
        if: hashFiles('dev/seed-data/templates/*.opt') != ''
        run: bash dev/scripts/load-seed.sh

      - name: Probe endpoints
        run: bash dev/scripts/check-health.sh

      - name: Run canonical queries
        if: hashFiles('tests/fixtures/canonical-queries.json') != ''
        run: bash tests/integration/run-canonical.sh http://localhost:8080/ehrbase/rest/openehr/v1

      - name: Dump EHRbase logs on failure
        if: failure()
        working-directory: dev
        run: docker compose logs ehrbase-postgres ehrbase

  lint:
    name: Lint YAML + PowerShell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install yamllint
        run: pip install yamllint

      - name: yamllint
        run: yamllint -c .yamllint.yml .github dev

      - name: PowerShell analyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path dev/scripts -Recurse -Severity Warning
          if ($results) { $results | Format-Table; exit 1 }
