name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, publish
    runs-on: windows-latest
    env:
      CODE_SIGN_CERT_PASSWORD: ${{ secrets.CODE_SIGN_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Expose MakePQX from restored SdkTools
        shell: pwsh
        run: |
          # `dotnet build` (next step) will restore Microsoft.PowerQuery.SdkTools
          # via /global.json into the NuGet global cache. Add its tools/ dir to
          # PATH so the subsequent sign step can invoke MakePQX.exe directly.
          # We run a throw-away restore first to guarantee the package exists.
          dotnet restore src/OpenEHR.proj
          $version = (Get-Content global.json | ConvertFrom-Json).'msbuild-sdks'.'Microsoft.PowerQuery.SdkTools'
          $tools = Join-Path $env:USERPROFILE ".nuget\packages\microsoft.powerquery.sdktools\$version\tools"
          if (-not (Test-Path $tools)) {
            throw "SdkTools tools directory not found at $tools"
          }
          "$tools" | Out-File -FilePath $env:GITHUB_PATH -Append
          Write-Output "MakePQX available at $tools"

      - name: Decode PFX from secret
        shell: pwsh
        env:
          CODE_SIGN_CERT_PFX_BASE64: ${{ secrets.CODE_SIGN_CERT_PFX_BASE64 }}
        run: |
          if (-not $env:CODE_SIGN_CERT_PFX_BASE64) {
            throw "CODE_SIGN_CERT_PFX_BASE64 secret is empty. Generate a dev PFX (see docs/getting-started/install-self-signed.md) and store it."
          }
          [IO.File]::WriteAllBytes("$env:GITHUB_WORKSPACE\dev-cert.pfx", [Convert]::FromBase64String($env:CODE_SIGN_CERT_PFX_BASE64))

      - name: Build .mez
        shell: pwsh
        run: |
          dotnet build src/OpenEHR.proj --configuration Release
          Get-ChildItem -Recurse -Path src\bin -Filter *.mez | ForEach-Object { Write-Host "Built: $($_.FullName)" }

      - name: Sign → .pqx
        shell: pwsh
        run: |
          $mez = Get-ChildItem -Recurse -Path src\bin -Filter OpenEHR.mez | Select-Object -First 1
          if (-not $mez) { throw "OpenEHR.mez not found under src\bin" }
          MakePQX sign --certificate "$env:GITHUB_WORKSPACE\dev-cert.pfx" --password $env:CODE_SIGN_CERT_PASSWORD $mez.FullName
          Get-ChildItem -Recurse -Path src\bin -Filter OpenEHR.pqx | ForEach-Object { Write-Host "Signed: $($_.FullName)" }

      - name: Verify Authenticode signature
        shell: pwsh
        run: |
          $pqx = Get-ChildItem -Recurse -Path src\bin -Filter OpenEHR.pqx | Select-Object -First 1
          if (-not $pqx) { throw "OpenEHR.pqx not found" }
          $sig = Get-AuthenticodeSignature $pqx.FullName
          Write-Host "Status: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid' -and $sig.Status -ne 'UnknownError') {
            throw "Signature status unexpected: $($sig.Status)"
          }

      - name: Export public .cer
        shell: pwsh
        run: |
          $secure = ConvertTo-SecureString -String $env:CODE_SIGN_CERT_PASSWORD -Force -AsPlainText
          $pfx = Get-PfxCertificate -FilePath "$env:GITHUB_WORKSPACE\dev-cert.pfx" -Password $secure
          Export-Certificate -Cert $pfx -FilePath "$env:GITHUB_WORKSPACE\dev-cert.cer" | Out-Null

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $pqx = Get-ChildItem -Recurse -Path src\bin -Filter OpenEHR.pqx | Select-Object -First 1
          Copy-Item $pqx.FullName -Destination release-assets\
          Copy-Item "$env:GITHUB_WORKSPACE\dev-cert.cer" -Destination release-assets\

      - name: Generate changelog fragment
        shell: bash
        run: |
          awk '/^## \[Unreleased\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md > release-assets/NOTES.md || true
          if [ ! -s release-assets/NOTES.md ]; then
            echo "No unreleased entries found; using tag body." > release-assets/NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          body_path: release-assets/NOTES.md
          files: |
            release-assets/OpenEHR.pqx
            release-assets/dev-cert.cer
          fail_on_unmatched_files: true
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
