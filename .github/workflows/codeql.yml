name: codeql

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "dev/scripts/**.ps1"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "dev/scripts/**.ps1"
  schedule:
    - cron: "17 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["actions"]
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
