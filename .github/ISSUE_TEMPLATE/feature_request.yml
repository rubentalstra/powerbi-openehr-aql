name: Feature request
description: Propose a new capability or enhancement.
title: "[feat]: "
labels:
  - enhancement
  - triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: audience
    attributes:
      label: Who benefits
      description: Analysts, gateway admins, vendors, platform engineers, etc.
