# Local openEHR CDR for dev.
# Starts Postgres + EHRbase + Keycloak (port placeholder only until Phase 2).
#
# Usage:
#   cp .env.example .env          # edit credentials
#   docker compose up -d
#   bash scripts/check-health.sh
#   bash scripts/load-seed.sh
#
# Versions are pinned; never use ':latest' here (we need reproducible CI).

name: openehr-dev

services:
  ehrbase-postgres:
    image: postgres:16.4-alpine
    container_name: ehrbase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      EHRBASE_USER: ${EHRBASE_DB_USER:-ehrbase}
      EHRBASE_PASSWORD: ${EHRBASE_DB_PASSWORD:-ehrbase}
      EHRBASE_USER_ADMIN: ${EHRBASE_DB_ADMIN_USER:-ehrbase_admin}
      EHRBASE_PASSWORD_ADMIN: ${EHRBASE_DB_ADMIN_PASSWORD:-ehrbase_admin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ehrbase-postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  ehrbase:
    image: ehrbase/ehrbase:2.15.0
    container_name: ehrbase
    restart: unless-stopped
    depends_on:
      ehrbase-postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ehrbase-postgres:5432/ehrbase
      SPRING_DATASOURCE_USERNAME: ${EHRBASE_DB_USER:-ehrbase}
      SPRING_DATASOURCE_PASSWORD: ${EHRBASE_DB_PASSWORD:-ehrbase}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "10"
      SPRING_FLYWAY_USER: ${EHRBASE_DB_ADMIN_USER:-ehrbase_admin}
      SPRING_FLYWAY_PASSWORD: ${EHRBASE_DB_ADMIN_PASSWORD:-ehrbase_admin}
      SECURITY_AUTHTYPE: BASIC
      SECURITY_AUTHUSER: ${EHRBASE_USER:-ehrbase}
      SECURITY_AUTHPASSWORD: ${EHRBASE_PASSWORD:-ehrbase}
      SECURITY_AUTHADMINUSER: ${EHRBASE_ADMIN_USER:-ehrbase_admin}
      SECURITY_AUTHADMINPASSWORD: ${EHRBASE_ADMIN_PASSWORD:-ehrbase_admin}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus,env"
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
    ports:
      - "${EHRBASE_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ehrbase/management/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  # Keycloak is started but NOT wired into EHRbase yet.
  # Reserved for Phase 2 OAuth work; keeping the port stable now avoids churn later.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: unless-stopped
    command: ["start-dev"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"

volumes:
  ehrbase-postgres-data:
